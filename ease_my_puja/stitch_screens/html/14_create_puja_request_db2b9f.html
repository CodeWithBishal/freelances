<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Puja Request</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e6d94c",
                        "background-light": "#f8f8f6",
                        "background-dark": "#211f11",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen antialiased">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden shadow-sm" style="--select-button-svg: url('data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2724px%27 height=%2724px%27 fill=%27rgb(149,143,80)%27 viewBox=%270 0 256 256%27%3e%3cpath d=%27M181.66,170.34a8,8,0,0,1,0,11.32l-48,48a8,8,0,0,1-11.32,0l-48-48a8,8,0,0,1,11.32-11.32L128,212.69l42.34-42.35A8,8,0,0,1,181.66,170.34Zm-96-84.68L128,43.31l42.34,42.35a8,8,0,0,0,11.32-11.32l-48-48a8,8,0,0,0-11.32,0l-48,48A8,8,0,0,0,85.66,85.66Z%27%3e%3c/path%3e%3c/svg%3e');">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 bg-background-light dark:bg-background-dark z-10">
<button class="flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Create Puja Request</h2>
</div>
<!-- Progress Indicator -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-4">
<div class="h-2 w-8 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<div class="flex-1 overflow-y-auto pb-24">
<!-- Select Puja Type -->
<div class="px-4 py-2">
<h1 class="text-[22px] font-bold leading-tight tracking-[-0.015em] pb-4 pt-2">Select Puja Type</h1>
<label class="flex flex-col w-full">
<p class="text-sm font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">Puja Type</p>
<select class="form-select flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 bg-[image:--select-button-svg] p-[15px] text-base font-normal leading-normal shadow-sm">
<option disabled="" selected="" value="">Select a Puja</option>
<option value="satyanarayan">Satyanarayan Puja</option>
<option value="ganesha">Ganesha Puja</option>
<option value="rudrabhishek">Rudrabhishek</option>
<option value="vastu">Vastu Shanti</option>
</select>
</label>
</div>
<hr class="my-4 border-slate-200 dark:border-slate-800 mx-4"/>
<!-- Date and Time -->
<div class="px-4 py-2">
<h1 class="text-[22px] font-bold leading-tight tracking-[-0.015em] pb-4 pt-2">Date and Time</h1>
<div class="flex flex-col gap-4">
<label class="flex flex-col w-full">
<p class="text-sm font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">Select Date</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 px-4 pl-12 text-base font-normal leading-normal shadow-sm" type="date"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">calendar_month</span>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-sm font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">Select Time</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 px-4 pl-12 text-base font-normal leading-normal shadow-sm" type="time"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">schedule</span>
</div>
</label>
</div>
</div>
<hr class="my-4 border-slate-200 dark:border-slate-800 mx-4"/>
<!-- Location -->
<div class="px-4 py-2">
<h1 class="text-[22px] font-bold leading-tight tracking-[-0.015em] pb-4 pt-2">Location</h1>
<label class="flex flex-col w-full">
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 px-4 pl-12 text-base font-normal leading-normal shadow-sm placeholder:text-slate-400" placeholder="Enter full address" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">location_on</span>
</div>
</label>
</div>
<hr class="my-4 border-slate-200 dark:border-slate-800 mx-4"/>
<!-- Pricing -->
<div class="px-4 py-2">
<h1 class="text-[22px] font-bold leading-tight tracking-[-0.015em] pb-4 pt-2">Pricing</h1>
<div class="bg-primary/20 dark:bg-primary/10 rounded-xl p-4 mb-4 border border-primary/30 flex items-center justify-between">
<div>
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Suggested Price</p>
<p class="text-xs text-slate-500 mt-1">Based on market rates</p>
</div>
<p class="text-xl font-bold text-slate-900 dark:text-slate-100">₹2,500</p>
</div>
<label class="flex flex-col w-full">
<p class="text-sm font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">Offer your price</p>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">₹</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 px-4 pl-8 text-base font-normal leading-normal shadow-sm" placeholder="2500" type="number"/>
</div>
</label>
</div>
</div>
<!-- Fixed Bottom Button -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-sm border-t border-slate-200 dark:border-slate-800 max-w-md mx-auto z-20">
<button class="w-full bg-primary hover:bg-primary/90 text-slate-900 font-bold text-lg h-14 rounded-xl flex items-center justify-center transition-colors shadow-md">
                Continue
            </button>
</div>
</div>
</body></html>
