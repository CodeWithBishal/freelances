<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Selection</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#e6d94c",
          "background-light": "#f8f8f6",
          "background-dark": "#211f11",
        },
        fontFamily: {
          "display": ["Lexend", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  body {
    font-family: 'Lexend', sans-serif;
  }
  .radio-custom {
    --radio-dot-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(230,217,76)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3ccircle cx=%278%27 cy=%278%27 r=%273%27/%3e%3c/svg%3e');
  }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display font-display overflow-x-hidden min-h-screen flex flex-col antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-white dark:bg-slate-900 shadow-md">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between border-b border-slate-200 dark:border-slate-800">
<button class="flex size-12 shrink-0 items-center justify-center text-slate-800 dark:text-slate-200 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-12 text-slate-900 dark:text-slate-100">Checkout</h2>
</div>
<!-- Main Content -->
<div class="flex-1 overflow-y-auto pb-24">
<!-- Amount Display -->
<div class="flex flex-col items-center justify-center py-8 px-4 bg-primary/10 dark:bg-primary/5 border-b border-primary/20 dark:border-primary/10">
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium leading-normal pb-2">Total Amount to Pay</p>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-5xl font-bold leading-tight">₹ 2,151</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Ganesh Chaturthi Special Puja</p>
</div>
<!-- Payment Methods -->
<div class="px-4 py-6">
<h3 class="text-slate-800 dark:text-slate-200 text-xl font-bold leading-tight tracking-tight pb-4">Select Payment Method</h3>
<div class="flex flex-col gap-4">
<!-- UPI Option -->
<label class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 p-4 flex-row-reverse cursor-pointer hover:border-primary/50 dark:hover:border-primary/50 transition-colors bg-white dark:bg-slate-800 shadow-sm">
<input checked="" class="radio-custom h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-transparent checked:border-primary checked:bg-[image:var(--radio-dot-svg)] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary transition-all cursor-pointer" name="payment_method" type="radio"/>
<div class="flex grow flex-col">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-xl">account_balance_wallet</span>
<p class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-normal">UPI</p>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal pl-7">Google Pay, PhonePe, Paytm</p>
</div>
</label>
<!-- Card Option -->
<label class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 p-4 flex-row-reverse cursor-pointer hover:border-primary/50 dark:hover:border-primary/50 transition-colors bg-white dark:bg-slate-800 shadow-sm">
<input class="radio-custom h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-transparent checked:border-primary checked:bg-[image:var(--radio-dot-svg)] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary transition-all cursor-pointer" name="payment_method" type="radio"/>
<div class="flex grow flex-col">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-xl">credit_card</span>
<p class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-normal">Credit / Debit Cards</p>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal pl-7">Visa, MasterCard, RuPay</p>
</div>
</label>
<!-- Wallets Option -->
<label class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 p-4 flex-row-reverse cursor-pointer hover:border-primary/50 dark:hover:border-primary/50 transition-colors bg-white dark:bg-slate-800 shadow-sm">
<input class="radio-custom h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-transparent checked:border-primary checked:bg-[image:var(--radio-dot-svg)] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary transition-all cursor-pointer" name="payment_method" type="radio"/>
<div class="flex grow flex-col">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-xl">wallet</span>
<p class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-normal">Wallets</p>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal pl-7">Amazon Pay, Mobikwik, Freecharge</p>
</div>
</label>
<!-- Net Banking Option -->
<label class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 p-4 flex-row-reverse cursor-pointer hover:border-primary/50 dark:hover:border-primary/50 transition-colors bg-white dark:bg-slate-800 shadow-sm">
<input class="radio-custom h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-transparent checked:border-primary checked:bg-[image:var(--radio-dot-svg)] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary transition-all cursor-pointer" name="payment_method" type="radio"/>
<div class="flex grow flex-col">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-xl">account_balance</span>
<p class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-normal">Net Banking</p>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal pl-7">All Indian Banks Supported</p>
</div>
</label>
</div>
</div>
<!-- Security Badge -->
<div class="flex justify-center items-center gap-2 py-4 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="text-sm font-medium">100% Secure Payments</span>
</div>
</div>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 pb-8 sm:pb-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<button class="w-full bg-[#ef4444] hover:bg-[#dc2626] text-white rounded-xl py-4 px-6 text-xl font-bold flex items-center justify-center gap-2 transition-colors shadow-lg">
            Pay ₹ 2,151
            <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</div>
</body></html>
